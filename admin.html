<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>管理画面 - 宴会クイズ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Noto Sans JP", sans-serif;
      }
    </style>
  </head>
  <body class="bg-zinc-950 text-zinc-100 min-h-screen">
    <main id="root" class="max-w-4xl mx-auto px-6 py-8 space-y-6">
      <header class="flex items-end justify-between border-b border-zinc-800 pb-4">
        <div>
          <h1 class="text-xl font-bold">管理画面</h1>
          <p id="auth-status" class="text-xs text-zinc-500 mt-1">接続中...</p>
        </div>
        <a href="index.html" class="text-sm text-zinc-400 hover:text-zinc-100"
          >← トップ</a
        >
      </header>
      <div id="error-slot"></div>
      <div id="app" class="hidden space-y-6">
        <section class="bg-zinc-900 border border-zinc-800 rounded-lg p-5 space-y-4">
          <h2 class="text-sm font-bold text-zinc-300 uppercase tracking-wide">
            進行コントロール
          </h2>
          <div
            id="status-display"
            class="bg-zinc-950 border border-zinc-800 rounded p-3 text-sm space-y-1"
          >
            読み込み中...
          </div>
          <div class="grid sm:grid-cols-2 md:grid-cols-4 gap-2">
            <button
              id="btn-start"
              class="bg-emerald-600 hover:bg-emerald-500 disabled:bg-zinc-800 disabled:text-zinc-500 disabled:cursor-not-allowed rounded px-4 py-2 font-medium text-sm"
            >
              次の問題スタート
            </button>
            <button
              id="btn-reveal"
              class="bg-blue-600 hover:bg-blue-500 disabled:bg-zinc-800 disabled:text-zinc-500 disabled:cursor-not-allowed rounded px-4 py-2 font-medium text-sm"
            >
              正解発表・採点
            </button>
            <button
              id="btn-final"
              class="bg-zinc-700 hover:bg-zinc-600 rounded px-4 py-2 font-medium text-sm"
            >
              最終結果表示
            </button>
            <button
              id="btn-reset"
              class="bg-rose-700 hover:bg-rose-600 rounded px-4 py-2 font-medium text-sm"
            >
              リセット
            </button>
          </div>
        </section>

        <section class="bg-zinc-900 border border-zinc-800 rounded-lg p-5 space-y-4">
          <div class="flex items-center justify-between">
            <h2 class="text-sm font-bold text-zinc-300 uppercase tracking-wide">
              チーム
            </h2>
            <button
              id="btn-seed-teams"
              class="text-xs bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 rounded px-3 py-1"
            >
              デフォルト 5 チーム作成
            </button>
          </div>
          <p class="text-xs text-zinc-500">
            各チームの QR はメイン画面で表示されます。参加者は QR 読み取り後、代表者名を入力してチームを決定します。
          </p>
          <div id="team-list" class="space-y-2"></div>
          <form id="team-form" class="flex gap-2">
            <input
              type="text"
              name="name"
              placeholder="新しいチーム名"
              required
              class="flex-1 bg-zinc-950 border border-zinc-800 rounded px-3 py-2 text-sm"
            />
            <button
              type="submit"
              class="bg-emerald-600 hover:bg-emerald-500 rounded px-4 py-2 text-sm font-medium"
            >
              追加
            </button>
          </form>
        </section>

        <section class="bg-zinc-900 border border-zinc-800 rounded-lg p-5 space-y-4">
          <h2 class="text-sm font-bold text-zinc-300 uppercase tracking-wide">
            クイズ
          </h2>
          <div id="quiz-list" class="space-y-2"></div>
          <form id="quiz-form" class="space-y-2 bg-zinc-950 border border-zinc-800 p-4 rounded">
            <input
              type="text"
              name="question"
              placeholder="問題文 (例: この人は誰でしょう？)"
              required
              class="w-full bg-zinc-900 border border-zinc-800 rounded px-3 py-2 text-sm"
            />
            <div class="flex items-start gap-3 flex-wrap">
              <input type="file" id="quiz-image" accept="image/*"
                class="text-xs text-zinc-300 file:mr-3 file:py-1.5 file:px-3 file:rounded file:border-0 file:bg-zinc-800 file:text-zinc-200 file:text-xs hover:file:bg-zinc-700 file:cursor-pointer">
              <div id="quiz-image-preview" class="hidden flex items-center gap-2">
                <img id="quiz-image-preview-img" class="h-16 w-16 object-cover rounded border border-zinc-800">
                <button type="button" id="btn-clear-image"
                  class="text-xs bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 rounded px-2 py-1">画像クリア</button>
                <span id="quiz-image-size" class="text-xs text-zinc-500"></span>
              </div>
            </div>
            <div class="grid sm:grid-cols-2 gap-2">
              <input
                type="text"
                name="choice0"
                placeholder="選択肢 1"
                required
                class="bg-zinc-900 border border-zinc-800 rounded px-3 py-2 text-sm"
              />
              <input
                type="text"
                name="choice1"
                placeholder="選択肢 2"
                required
                class="bg-zinc-900 border border-zinc-800 rounded px-3 py-2 text-sm"
              />
              <input
                type="text"
                name="choice2"
                placeholder="選択肢 3"
                required
                class="bg-zinc-900 border border-zinc-800 rounded px-3 py-2 text-sm"
              />
              <input
                type="text"
                name="choice3"
                placeholder="選択肢 4"
                required
                class="bg-zinc-900 border border-zinc-800 rounded px-3 py-2 text-sm"
              />
            </div>
            <div class="flex gap-2 items-center flex-wrap text-sm">
              <label class="text-zinc-400">正解:</label>
              <select
                name="correctIndex"
                class="bg-zinc-900 border border-zinc-800 rounded px-3 py-2"
              >
                <option value="0">選択肢 1</option>
                <option value="1">選択肢 2</option>
                <option value="2">選択肢 3</option>
                <option value="3">選択肢 4</option>
              </select>
              <label class="text-zinc-400 ml-2">点数:</label>
              <input
                type="number"
                name="points"
                min="1"
                max="1000"
                value="10"
                required
                class="bg-zinc-900 border border-zinc-800 rounded px-3 py-2 w-20"
              />
              <button
                type="submit"
                class="ml-auto bg-emerald-600 hover:bg-emerald-500 rounded px-4 py-2 font-medium"
              >
                追加
              </button>
            </div>
          </form>
        </section>
      </div>
    </main>

    <script src="env.js"></script>
    <script type="module">
      import {
        ensureSignedIn,
        envError,
        db,
        APP_ID,
        refs,
        TEAM_COLORS,
        DURATION_MS,
        SCORE_PER_CORRECT,
        escapeHtml,
        renderSetupError,
      } from "./js/firebase-init.js";
      import {
        onSnapshot,
        getDocs,
        getDoc,
        setDoc,
        updateDoc,
        addDoc,
        deleteDoc,
        doc,
        query,
        orderBy,
        where,
        writeBatch,
      } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

      const authStatus = document.getElementById("auth-status");
      const errorSlot = document.getElementById("error-slot");
      const appEl = document.getElementById("app");

      if (envError) {
        renderSetupError(errorSlot, envError);
        authStatus.textContent = "Firebase: 未設定";
        throw new Error(envError);
      }

      let user;
      try {
        user = await ensureSignedIn();
      } catch (err) {
        renderSetupError(errorSlot, err.message || String(err));
        authStatus.textContent = "Firebase: 接続失敗";
        throw err;
      }

      appEl.classList.remove("hidden");
      authStatus.textContent = `接続済 / AppID: ${APP_ID} / UID: ${user.uid.slice(
        0,
        8
      )}`;

      const stateRef = refs.state();
      const initialSnap = await getDoc(stateRef);
      if (!initialSnap.exists()) {
        await setDoc(stateRef, {
          status: "waiting",
          currentQuizId: null,
          currentQuizIndex: -1,
          votingStartedAt: null,
          durationMs: DURATION_MS,
          scoredForQuizId: null,
        });
      }

      let currentState = null;
      let quizzes = [];
      let teams = [];

      onSnapshot(stateRef, (snap) => {
        currentState = snap.data();
        renderStatus();
        updateControlButtons();
      });
      onSnapshot(query(refs.quizzes(), orderBy("order")), (snap) => {
        quizzes = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
        renderQuizzes();
        renderStatus();
        updateControlButtons();
      });
      onSnapshot(query(refs.teams(), orderBy("order")), (snap) => {
        teams = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
        renderTeams();
      });

      setInterval(() => {
        if (currentState?.status === "voting") renderStatus();
      }, 500);

      function renderStatus() {
        const el = document.getElementById("status-display");
        if (!currentState) return;
        const quiz = quizzes.find((q) => q.id === currentState.currentQuizId);
        const label =
          {
            waiting: "待機中",
            voting: "回答受付中",
            result: "結果表示",
            final_ranking: "最終結果",
          }[currentState.status] || currentState.status;

        let timerText = "";
        if (currentState.status === "voting" && currentState.votingStartedAt) {
          const elapsed = Date.now() - currentState.votingStartedAt;
          const remaining = Math.max(
            0,
            Math.ceil((currentState.durationMs - elapsed) / 1000)
          );
          timerText =
            remaining > 0
              ? ` / 残り ${remaining} 秒で自動採点`
              : " / 自動採点中...";
        }

        el.innerHTML = `
          <div>ステータス: <strong class="text-zinc-100">${label}</strong>${timerText}</div>
          <div>現在の問題: ${
            quiz
              ? `#${currentState.currentQuizIndex + 1} ${escapeHtml(
                  quiz.question
                )}`
              : "未設定"
          }</div>
          <div class="text-zinc-500">登録: クイズ ${quizzes.length} 件 / チーム ${teams.length} 件</div>
        `;
      }

      function updateControlButtons() {
        const start = document.getElementById("btn-start");
        const reveal = document.getElementById("btn-reveal");
        if (!currentState) return;
        const hasNext =
          quizzes.length > 0 &&
          currentState.currentQuizIndex + 1 < quizzes.length;
        start.disabled = currentState.status === "voting" || !hasNext;
        reveal.disabled = currentState.status !== "voting";
      }

      function renderTeams() {
        const list = document.getElementById("team-list");
        if (teams.length === 0) {
          list.innerHTML =
            '<p class="text-xs text-zinc-500">チーム未登録</p>';
          return;
        }
        list.innerHTML = teams
          .map((t, i) => {
            const color = TEAM_COLORS[i % TEAM_COLORS.length];
            return `
            <div class="flex items-center gap-2 bg-zinc-950 border border-zinc-800 p-2 rounded flex-wrap text-sm">
              <span class="w-3 h-3 rounded-full" style="background-color:${color}"></span>
              <input class="flex-1 min-w-[120px] bg-zinc-900 border border-zinc-800 rounded px-2 py-1"
                value="${escapeHtml(t.name)}" data-action="rename" data-id="${t.id}">
              <span class="text-zinc-500">スコア <span class="text-zinc-100">${
                t.score || 0
              }</span></span>
              <span class="text-zinc-500">代表 ${
                t.representative
                  ? `<span class="text-zinc-100">${escapeHtml(
                      t.representative
                    )}</span>`
                  : `<span class="text-zinc-600">未登録</span>`
              }</span>
              <button class="text-xs bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 rounded px-2 py-1"
                data-action="clear-rep" data-id="${t.id}">代表クリア</button>
              <button class="text-xs bg-rose-900 hover:bg-rose-800 border border-rose-800 rounded px-2 py-1"
                data-action="delete" data-id="${t.id}">削除</button>
            </div>`;
          })
          .join("");
      }

      function renderQuizzes() {
        const list = document.getElementById("quiz-list");
        if (quizzes.length === 0) {
          list.innerHTML =
            '<p class="text-xs text-zinc-500">問題未登録</p>';
          return;
        }
        list.innerHTML = quizzes
          .map(
            (q, i) => `
          <div class="bg-zinc-950 border border-zinc-800 p-3 rounded">
            <div class="flex items-start gap-2">
              <span class="text-xs text-zinc-500 font-mono">#${i + 1}</span>
              ${
                q.imageUrl
                  ? `<img src="${q.imageUrl}" class="w-12 h-12 object-cover rounded border border-zinc-800 shrink-0">`
                  : ""
              }
              <div class="flex-1 text-sm">
                <div class="font-medium flex items-center gap-2 flex-wrap">
                  <span>${escapeHtml(q.question)}</span>
                  <span class="text-xs bg-amber-900/40 border border-amber-700 text-amber-200 rounded px-2 py-0.5">${
                    q.points || 10
                  } 点</span>
                </div>
                <div class="text-xs text-zinc-500 mt-1 flex flex-wrap gap-x-3">
                  ${q.choices
                    .map(
                      (c, idx) =>
                        `<span class="${
                          idx === q.correctIndex
                            ? "text-emerald-400"
                            : ""
                        }">${idx + 1}. ${escapeHtml(c)}${
                          idx === q.correctIndex ? " ✓" : ""
                        }</span>`
                    )
                    .join("")}
                </div>
              </div>
              <button class="text-xs bg-rose-900 hover:bg-rose-800 border border-rose-800 rounded px-2 py-1"
                data-action="delete-quiz" data-id="${q.id}">削除</button>
            </div>
          </div>`
          )
          .join("");
      }

      document
        .getElementById("team-list")
        .addEventListener("click", async (e) => {
          const action = e.target.dataset.action;
          const id = e.target.dataset.id;
          if (!action || !id) return;
          if (action === "delete") {
            if (confirm("このチームを削除しますか？")) {
              await deleteDoc(refs.team(id));
            }
          } else if (action === "clear-rep") {
            await updateDoc(refs.team(id), { representative: null });
          }
        });
      document
        .getElementById("team-list")
        .addEventListener("change", async (e) => {
          if (e.target.dataset.action === "rename") {
            await updateDoc(refs.team(e.target.dataset.id), {
              name: e.target.value.trim(),
            });
          }
        });

      document
        .getElementById("quiz-list")
        .addEventListener("click", async (e) => {
          if (
            e.target.dataset.action === "delete-quiz" &&
            confirm("この問題を削除しますか？")
          ) {
            await deleteDoc(refs.quiz(e.target.dataset.id));
          }
        });

      document
        .getElementById("team-form")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const name = e.target.name.value.trim();
          if (!name) return;
          const order =
            teams.length > 0
              ? Math.max(...teams.map((t) => t.order || 0)) + 1
              : 0;
          await addDoc(refs.teams(), {
            name,
            score: 0,
            representative: null,
            order,
          });
          e.target.reset();
        });

      document
        .getElementById("btn-seed-teams")
        .addEventListener("click", async () => {
          if (
            !confirm(
              "デフォルトの 5 チームを作成します。既存のチームはそのまま残ります。"
            )
          )
            return;
          const defaults = ["チーム A", "チーム B", "チーム C", "チーム D", "チーム E"];
          const batch = writeBatch(db);
          const base = teams.length;
          for (let i = 0; i < defaults.length; i++) {
            const newRef = doc(refs.teams());
            batch.set(newRef, {
              name: defaults[i],
              score: 0,
              representative: null,
              order: base + i,
            });
          }
          await batch.commit();
        });

      let currentImageDataUrl = null;

      async function fileToResizedDataUrl(file, maxSize = 800, quality = 0.8) {
        const img = new Image();
        const url = URL.createObjectURL(file);
        try {
          await new Promise((resolve, reject) => {
            img.onload = resolve;
            img.onerror = reject;
            img.src = url;
          });
        } finally {
          URL.revokeObjectURL(url);
        }
        let { width, height } = img;
        if (width > height && width > maxSize) {
          height = Math.round((height * maxSize) / width);
          width = maxSize;
        } else if (height >= width && height > maxSize) {
          width = Math.round((width * maxSize) / height);
          height = maxSize;
        }
        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;
        canvas.getContext("2d").drawImage(img, 0, 0, width, height);
        return canvas.toDataURL("image/jpeg", quality);
      }

      function clearQuizImage() {
        currentImageDataUrl = null;
        document.getElementById("quiz-image").value = "";
        document.getElementById("quiz-image-preview").classList.add("hidden");
      }

      document
        .getElementById("quiz-image")
        .addEventListener("change", async (e) => {
          const file = e.target.files[0];
          if (!file) return;
          try {
            let dataUrl = await fileToResizedDataUrl(file, 800, 0.8);
            if (dataUrl.length > 900_000) {
              dataUrl = await fileToResizedDataUrl(file, 600, 0.7);
            }
            if (dataUrl.length > 900_000) {
              alert(
                "画像サイズが大きすぎます。別の画像を選ぶか、事前にサイズを小さくしてください。"
              );
              clearQuizImage();
              return;
            }
            currentImageDataUrl = dataUrl;
            const img = document.getElementById("quiz-image-preview-img");
            img.src = dataUrl;
            document
              .getElementById("quiz-image-preview")
              .classList.remove("hidden");
            document.getElementById(
              "quiz-image-size"
            ).textContent = `${Math.round(dataUrl.length / 1024)} KB`;
          } catch (err) {
            console.error(err);
            alert("画像の処理に失敗しました: " + err.message);
          }
        });

      document
        .getElementById("btn-clear-image")
        .addEventListener("click", clearQuizImage);

      document
        .getElementById("quiz-form")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const fd = new FormData(e.target);
          const order =
            quizzes.length > 0
              ? Math.max(...quizzes.map((q) => q.order || 0)) + 1
              : 0;
          await addDoc(refs.quizzes(), {
            question: fd.get("question").trim(),
            choices: [0, 1, 2, 3].map((i) => fd.get(`choice${i}`).trim()),
            correctIndex: parseInt(fd.get("correctIndex"), 10),
            points: parseInt(fd.get("points"), 10) || 10,
            imageUrl: currentImageDataUrl || null,
            order,
          });
          e.target.reset();
          clearQuizImage();
        });

      document
        .getElementById("btn-start")
        .addEventListener("click", async () => {
          const nextIndex = (currentState?.currentQuizIndex ?? -1) + 1;
          if (nextIndex >= quizzes.length) {
            alert("次の問題がありません");
            return;
          }
          if (teams.length === 0) {
            alert("チームを先に登録してください");
            return;
          }
          const quiz = quizzes[nextIndex];
          await updateDoc(stateRef, {
            status: "voting",
            currentQuizId: quiz.id,
            currentQuizIndex: nextIndex,
            votingStartedAt: Date.now(),
            durationMs: DURATION_MS,
          });
        });

      async function doReveal() {
        if (!currentState || currentState.status !== "voting") return;
        const quizId = currentState.currentQuizId;
        const quiz = quizzes.find((q) => q.id === quizId);
        if (!quiz) return;
        if (currentState.scoredForQuizId !== quizId) {
          const ansSnap = await getDocs(
            query(refs.answers(), where("quizId", "==", quizId))
          );
          const batch = writeBatch(db);
          const teamMap = new Map(teams.map((t) => [t.id, t]));
          const points = quiz.points || SCORE_PER_CORRECT;
          ansSnap.docs.forEach((d) => {
            const a = d.data();
            if (a.choice === quiz.correctIndex) {
              const team = teamMap.get(a.teamId);
              if (team) {
                batch.update(refs.team(a.teamId), {
                  score: (team.score || 0) + points,
                });
              }
            }
          });
          batch.update(stateRef, {
            status: "result",
            scoredForQuizId: quizId,
          });
          await batch.commit();
        } else {
          await updateDoc(stateRef, { status: "result" });
        }
      }

      document.getElementById("btn-reveal").addEventListener("click", doReveal);

      let autoRevealInFlight = false;
      setInterval(async () => {
        if (!currentState || currentState.status !== "voting") {
          autoRevealInFlight = false;
          return;
        }
        if (autoRevealInFlight) return;
        const elapsed =
          Date.now() - (currentState.votingStartedAt || Date.now());
        if (elapsed < (currentState.durationMs || 30000)) return;
        autoRevealInFlight = true;
        try {
          await doReveal();
        } finally {
          autoRevealInFlight = false;
        }
      }, 500);

      document
        .getElementById("btn-final")
        .addEventListener("click", async () => {
          await updateDoc(stateRef, { status: "final_ranking" });
        });

      document
        .getElementById("btn-reset")
        .addEventListener("click", async () => {
          if (
            !confirm(
              "スコアと回答をリセットします。問題とチームは残ります。よろしいですか？"
            )
          )
            return;
          const ansSnap = await getDocs(refs.answers());
          const batch = writeBatch(db);
          ansSnap.docs.forEach((d) => batch.delete(d.ref));
          teams.forEach((t) =>
            batch.update(refs.team(t.id), { score: 0, representative: null })
          );
          batch.update(stateRef, {
            status: "waiting",
            currentQuizId: null,
            currentQuizIndex: -1,
            votingStartedAt: null,
            scoredForQuizId: null,
          });
          await batch.commit();
        });
    </script>
  </body>
</html>
