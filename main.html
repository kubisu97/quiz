<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>メイン画面 - 宴会クイズ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs/qrcode.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Noto Sans JP", sans-serif;
      }
      .timer-ring {
        transition: stroke-dashoffset 0.4s linear;
      }
    </style>
  </head>
  <body class="bg-zinc-950 text-zinc-100 min-h-screen">
    <main id="root" class="min-h-screen p-10 flex flex-col">
      <p class="text-center text-zinc-500">接続中...</p>
    </main>

    <script src="env.js"></script>
    <script type="module">
      import {
        ensureSignedIn,
        envError,
        refs,
        TEAM_COLORS,
        escapeHtml,
        renderSetupError,
      } from "./js/firebase-init.js";
      import {
        onSnapshot,
        query,
        orderBy,
        where,
      } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

      const root = document.getElementById("root");

      if (envError) {
        renderSetupError(root, envError);
        throw new Error(envError);
      }

      try {
        await ensureSignedIn();
      } catch (err) {
        renderSetupError(root, err.message || String(err));
        throw err;
      }

      let state = null;
      let quizzes = [];
      let teams = [];
      let answers = [];
      let answersUnsub = null;
      let lastQuizId = null;

      onSnapshot(refs.state(), (snap) => {
        state = snap.exists() ? snap.data() : null;
        syncAnswersListener();
        render();
      });
      onSnapshot(query(refs.quizzes(), orderBy("order")), (snap) => {
        quizzes = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
        render();
      });
      onSnapshot(query(refs.teams(), orderBy("order")), (snap) => {
        teams = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
        render();
      });

      setInterval(() => {
        if (state?.status === "voting") render();
      }, 250);

      function syncAnswersListener() {
        const quizId = state?.currentQuizId;
        if (quizId === lastQuizId) return;
        lastQuizId = quizId;
        if (answersUnsub) {
          answersUnsub();
          answersUnsub = null;
        }
        answers = [];
        if (quizId) {
          answersUnsub = onSnapshot(
            query(refs.answers(), where("quizId", "==", quizId)),
            (snap) => {
              answers = snap.docs.map((d) => d.data());
              render();
            }
          );
        }
      }

      function teamColor(idx) {
        return TEAM_COLORS[idx % TEAM_COLORS.length];
      }

      function playerUrl(teamId) {
        const url = new URL("player.html", window.location.href);
        url.searchParams.set("team", teamId);
        return url.toString();
      }

      function render() {
        if (!state) {
          root.innerHTML = `<div class="flex-1 flex items-center justify-center"><p class="text-zinc-500">待機中...</p></div>`;
          return;
        }
        if (state.status === "voting") return renderVoting();
        if (state.status === "result") return renderResult();
        if (state.status === "final_ranking") return renderFinal();
        return renderWaiting();
      }

      function renderWaiting() {
        const currentIdx = state.currentQuizIndex ?? -1;
        const isStart = currentIdx < 0;
        root.innerHTML = `
          <header class="text-center mb-8">
            <p class="text-xs text-zinc-500 tracking-widest mb-2">ENKAI QUIZ</p>
            <h1 class="text-4xl md:text-5xl font-bold">
              ${isStart ? "まもなく開始" : "次の問題を準備中"}
            </h1>
            <p class="mt-3 text-zinc-400">
              各チームの代表者はスマホで QR を読み取り、名前を入力してください
            </p>
          </header>
          <section id="qr-grid" class="grid ${
            teams.length <= 3
              ? "grid-cols-1 md:grid-cols-3"
              : "grid-cols-2 md:grid-cols-5"
          } gap-5 mb-8"></section>
          ${teams.length > 0 ? renderScoreboard() : ""}
        `;

        const grid = document.getElementById("qr-grid");
        teams.forEach((t, i) => {
          const color = teamColor(i);
          const card = document.createElement("div");
          card.className =
            "bg-white rounded-lg p-4 flex flex-col items-center";
          card.innerHTML = `
            <div class="w-full flex items-center gap-2 mb-3">
              <span class="w-3 h-3 rounded-full" style="background-color:${color}"></span>
              <span class="text-zinc-900 font-bold flex-1 truncate">${escapeHtml(
                t.name
              )}</span>
            </div>
            <div id="qr-${t.id}"></div>
            <div class="text-zinc-600 text-xs mt-3">
              代表: ${
                t.representative
                  ? `<span class="text-zinc-900 font-medium">${escapeHtml(
                      t.representative
                    )}</span>`
                  : `<span class="text-zinc-400">未登録</span>`
              }
            </div>
          `;
          grid.appendChild(card);
          new QRCode(card.querySelector(`#qr-${t.id}`), {
            text: playerUrl(t.id),
            width: 180,
            height: 180,
            correctLevel: QRCode.CorrectLevel.M,
          });
        });
      }

      function renderCorrectTeamsBanner(correct, teamById, answerByTeam, quiz) {
        const correctTeams = [];
        teamById.forEach((t) => {
          const a = answerByTeam.get(t.id);
          if (a && a.choice === correct) correctTeams.push(t);
        });
        const points = quiz.points || 10;
        if (correctTeams.length === 0) {
          return `
            <div class="max-w-5xl w-full bg-zinc-900 border-2 border-zinc-700 rounded-lg p-5 text-center">
              <div class="text-xs text-zinc-500 tracking-wide">正解チーム</div>
              <div class="text-2xl font-bold text-zinc-400 mt-1">正解なし…</div>
            </div>`;
        }
        return `
          <div class="max-w-5xl w-full bg-emerald-950/40 border-2 border-emerald-500 rounded-lg p-5">
            <div class="text-center mb-3">
              <div class="text-sm text-emerald-300 tracking-wide">🎉 正解チーム ・ +${points} 点</div>
            </div>
            <div class="flex flex-wrap justify-center gap-3">
              ${correctTeams
                .map((t) => {
                  const color = teamColor(t.origIndex);
                  return `
                  <div class="flex items-center gap-3 bg-zinc-950 rounded-lg px-4 py-3 border-2"
                    style="border-color:${color}">
                    <span class="w-3 h-3 rounded-full" style="background-color:${color}"></span>
                    <span class="text-xl md:text-2xl font-bold">${escapeHtml(
                      t.name
                    )}</span>
                    ${
                      t.representative
                        ? `<span class="text-sm text-zinc-400">${escapeHtml(
                            t.representative
                          )}</span>`
                        : ""
                    }
                  </div>`;
                })
                .join("")}
            </div>
          </div>`;
      }

      function renderScoreboard() {
        const sorted = [...teams]
          .map((t, i) => ({ ...t, origIndex: i }))
          .sort((a, b) => (b.score || 0) - (a.score || 0));
        const max = Math.max(1, ...teams.map((x) => x.score || 0));
        return `
          <section class="max-w-3xl mx-auto w-full bg-zinc-900 border border-zinc-800 rounded-lg p-5">
            <h2 class="text-sm font-bold text-zinc-300 uppercase tracking-wide mb-3">
              現在のスコア
            </h2>
            <div class="space-y-2">
              ${sorted
                .map((t) => {
                  const color = teamColor(t.origIndex);
                  const pct = ((t.score || 0) / max) * 100;
                  return `
                  <div class="flex items-center gap-3 text-sm">
                    <div class="w-32 font-medium truncate">${escapeHtml(
                      t.name
                    )}</div>
                    <div class="flex-1 bg-zinc-950 rounded h-5 overflow-hidden">
                      <div class="h-full" style="width:${pct}%;background-color:${color}"></div>
                    </div>
                    <div class="w-16 text-right font-bold">${t.score || 0}</div>
                  </div>`;
                })
                .join("")}
            </div>
          </section>`;
      }

      function renderVoting() {
        const quiz = quizzes.find((q) => q.id === state.currentQuizId);
        if (!quiz) {
          root.innerHTML = `<div class="flex-1 flex items-center justify-center"><p class="text-zinc-500">問題情報が見つかりません</p></div>`;
          return;
        }
        const elapsed = Date.now() - (state.votingStartedAt || Date.now());
        const duration = state.durationMs || 30000;
        const remainingMs = Math.max(0, duration - elapsed);
        const remaining = Math.ceil(remainingMs / 1000);
        const progress = Math.max(0, Math.min(1, remainingMs / duration));
        const answeredTeamIds = new Set(answers.map((a) => a.teamId));

        const circumference = 2 * Math.PI * 65;
        const dashOffset = circumference * (1 - progress);
        const timerColor =
          remaining <= 5 ? "#f87171" : remaining <= 10 ? "#fbbf24" : "#a3a3a3";

        root.innerHTML = `
          <header class="mb-4 flex items-center justify-between">
            <span class="text-zinc-500 text-sm">
              問題 ${(state.currentQuizIndex ?? 0) + 1} / ${quizzes.length}
            </span>
            <span class="bg-amber-900/40 border border-amber-700 text-amber-200 rounded-full px-4 py-1 font-bold">
              ${quiz.points || 10} 点問題
            </span>
          </header>
          <section class="flex-1 flex flex-col items-center justify-center gap-6">
            <h1 class="text-3xl md:text-5xl font-bold text-center max-w-5xl leading-snug">
              ${escapeHtml(quiz.question)}
            </h1>
            ${
              quiz.imageUrl
                ? `<img src="${quiz.imageUrl}" class="max-h-80 md:max-h-96 rounded-lg border border-zinc-800 object-contain">`
                : ""
            }
            <div class="relative">
              <svg width="160" height="160" viewBox="0 0 160 160">
                <circle cx="80" cy="80" r="65" stroke="#27272a" stroke-width="10" fill="none"/>
                <circle cx="80" cy="80" r="65" stroke="${timerColor}" stroke-width="10" fill="none"
                  stroke-linecap="round"
                  transform="rotate(-90 80 80)"
                  stroke-dasharray="${circumference}"
                  stroke-dashoffset="${dashOffset}"
                  class="timer-ring"/>
              </svg>
              <div class="absolute inset-0 flex items-center justify-center">
                <span class="text-5xl font-bold" style="color:${timerColor}">${remaining}</span>
              </div>
            </div>
            <div class="grid grid-cols-2 gap-3 max-w-5xl w-full">
              ${quiz.choices
                .map(
                  (c, i) => `
                <div class="bg-zinc-900 border border-zinc-800 rounded-lg p-5 text-xl md:text-2xl font-medium flex items-center gap-4">
                  <span class="w-9 h-9 rounded bg-zinc-800 text-zinc-300 flex items-center justify-center font-bold shrink-0">${
                    i + 1
                  }</span>
                  <span>${escapeHtml(c)}</span>
                </div>`
                )
                .join("")}
            </div>
          </section>
          <section class="max-w-5xl mx-auto w-full mt-6">
            <div class="text-xs text-zinc-500 mb-2">
              回答済み ${answeredTeamIds.size} / ${teams.length}
            </div>
            <div class="flex flex-wrap gap-2">
              ${teams
                .map((t, i) => {
                  const answered = answeredTeamIds.has(t.id);
                  const color = teamColor(i);
                  return `
                  <div class="px-3 py-1.5 rounded border text-sm flex items-center gap-2 ${
                    answered ? "" : "opacity-40"
                  }"
                    style="border-color:${color}">
                    <span class="w-2 h-2 rounded-full" style="background-color:${color}"></span>
                    ${escapeHtml(t.name)} ${answered ? "✓" : ""}
                  </div>`;
                })
                .join("")}
            </div>
          </section>
        `;
      }

      function renderResult() {
        const quiz = quizzes.find((q) => q.id === state.currentQuizId);
        if (!quiz) {
          root.innerHTML = `<div class="flex-1 flex items-center justify-center"><p class="text-zinc-500">問題情報が見つかりません</p></div>`;
          return;
        }
        const correct = quiz.correctIndex;
        const teamById = new Map(
          teams.map((t, i) => [t.id, { ...t, origIndex: i }])
        );
        const answerByTeam = new Map(answers.map((a) => [a.teamId, a]));

        root.innerHTML = `
          <header class="mb-4 text-center">
            <p class="text-xs text-zinc-500 tracking-wide">正解発表 ・ ${
              quiz.points || 10
            } 点</p>
            <h1 class="text-2xl md:text-3xl font-bold mt-1">
              ${escapeHtml(quiz.question)}
            </h1>
            ${
              quiz.imageUrl
                ? `<img src="${quiz.imageUrl}" class="mt-3 max-h-56 md:max-h-64 rounded-lg border border-zinc-800 object-contain mx-auto">`
                : ""
            }
          </header>
          <section class="flex-1 flex flex-col items-center justify-center gap-6">
            <div class="grid grid-cols-2 gap-3 max-w-5xl w-full">
              ${quiz.choices
                .map((c, i) => {
                  const isCorrect = i === correct;
                  return `
                  <div class="rounded-lg p-5 text-xl md:text-2xl font-medium flex items-center gap-4 ${
                    isCorrect
                      ? "bg-emerald-900/40 border border-emerald-500"
                      : "bg-zinc-900 border border-zinc-800 opacity-50"
                  }">
                    <span class="w-9 h-9 rounded ${
                      isCorrect
                        ? "bg-emerald-500 text-zinc-950"
                        : "bg-zinc-800 text-zinc-300"
                    } flex items-center justify-center font-bold shrink-0">${
                    i + 1
                  }</span>
                    <span>${escapeHtml(c)}</span>
                    ${
                      isCorrect
                        ? '<span class="ml-auto text-sm text-emerald-400">正解</span>'
                        : ""
                    }
                  </div>`;
                })
                .join("")}
            </div>
            ${renderCorrectTeamsBanner(correct, teamById, answerByTeam, quiz)}
            <div class="max-w-5xl w-full bg-zinc-900 border border-zinc-800 rounded-lg p-5">
              <h2 class="text-sm font-bold text-zinc-300 uppercase tracking-wide mb-3">
                チームの回答
              </h2>
              <div class="flex flex-wrap gap-3">
                ${teams
                  .map((t, i) => {
                    const a = answerByTeam.get(t.id);
                    const color = teamColor(i);
                    const isCorrect = a?.choice === correct;
                    return `
                    <div class="px-3 py-2 rounded border text-sm"
                      style="border-color:${color}">
                      <div class="flex items-center gap-2 text-zinc-400 text-xs">
                        <span class="w-2 h-2 rounded-full" style="background-color:${color}"></span>
                        ${escapeHtml(t.name)}
                      </div>
                      <div class="mt-1">
                        ${
                          a
                            ? `${a.choice + 1}. ${escapeHtml(
                                quiz.choices[a.choice]
                              )} <span class="${
                                isCorrect
                                  ? "text-emerald-400"
                                  : "text-rose-400"
                              }">${isCorrect ? "✓" : "✗"}</span>`
                            : "<span class='text-zinc-600'>未回答</span>"
                        }
                      </div>
                    </div>`;
                  })
                  .join("")}
              </div>
            </div>
          </section>
          ${renderScoreboard()}
        `;
      }

      function renderFinal() {
        const sorted = [...teams]
          .map((t, i) => ({ ...t, origIndex: i }))
          .sort((a, b) => (b.score || 0) - (a.score || 0));
        const medals = ["1st", "2nd", "3rd"];
        root.innerHTML = `
          <header class="text-center mb-10">
            <p class="text-xs text-zinc-500 tracking-widest">FINAL RESULT</p>
            <h1 class="text-4xl md:text-5xl font-bold mt-2">最終結果</h1>
          </header>
          <section class="flex-1 flex items-center justify-center">
            <div class="max-w-3xl w-full space-y-3">
              ${sorted
                .map((t, rank) => {
                  const color = teamColor(t.origIndex);
                  const label = medals[rank] || `${rank + 1}th`;
                  const emphasize = rank === 0;
                  return `
                  <div class="flex items-center gap-4 rounded-lg p-4 ${
                    emphasize
                      ? "bg-zinc-900 border-2"
                      : "bg-zinc-900 border border-zinc-800"
                  }" ${emphasize ? `style="border-color:${color}"` : ""}>
                    <div class="text-2xl font-bold text-zinc-400 w-14">${label}</div>
                    <div class="w-2 h-10 rounded" style="background-color:${color}"></div>
                    <div class="flex-1 text-xl md:text-2xl font-bold">${escapeHtml(
                      t.name
                    )}</div>
                    <div class="text-2xl md:text-3xl font-bold">${
                      t.score || 0
                    } <span class="text-sm text-zinc-500">点</span></div>
                  </div>`;
                })
                .join("")}
            </div>
          </section>
        `;
      }
    </script>
  </body>
</html>
